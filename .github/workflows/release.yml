name: Build and Release

on:
  push:
    tags:
      - "v*.*.*" # Trigger on version tags like v1.0.0
  workflow_dispatch: # Allow manual trigger
    inputs:
      version:
        description: "Release version (e.g., v1.0.0)"
        required: false
        default: ""

env:
  FLUTTER_VERSION: "3.41.5"
  PROJECT_DIR: "cb_file_manager"

jobs:
  # Generate release notes from commits
  generate-release-notes:
    runs-on: ubuntu-latest
    outputs:
      release_notes: ${{ steps.notes.outputs.notes }}
      version_name: ${{ steps.version.outputs.version_name }}
      version_code: ${{ steps.version.outputs.version_code }}
      version_tag: ${{ steps.version.outputs.version_tag }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetch all history for changelog
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get and auto-increment version
        id: version
        run: |
          PUBSPEC="${{ env.PROJECT_DIR }}/pubspec.yaml"

          # Read current version from pubspec.yaml
          VERSION_LINE=$(grep "^version:" "$PUBSPEC" | sed 's/version: //')
          VERSION_NAME="${VERSION_LINE%%+*}"
          if [[ "$VERSION_LINE" == *"+"* ]]; then
            CURRENT_BUILD="${VERSION_LINE##*+}"
          else
            CURRENT_BUILD="0"
          fi

          # Validate tag matches version name
          if [ "${{ github.event_name }}" == "push" ]; then
            TAG_REF="${GITHUB_REF#refs/tags/}"
            if [ "$TAG_REF" != "v$VERSION_NAME" ]; then
              echo "::error::Tag $TAG_REF does not match pubspec version v$VERSION_NAME"
              exit 1
            fi
          fi

          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            INPUT_VERSION="${{ github.event.inputs.version }}"
            if [ -n "$INPUT_VERSION" ] && [ "$INPUT_VERSION" != "v$VERSION_NAME" ] && [ "$INPUT_VERSION" != "$VERSION_NAME" ]; then
              echo "::error::Input version $INPUT_VERSION does not match pubspec version v$VERSION_NAME"
              exit 1
            fi
          fi

          # Increment build number
          NEW_BUILD=$((CURRENT_BUILD + 1))

          # Write back to pubspec.yaml
          sed -i "s/^version:.*/version: $VERSION_NAME+$NEW_BUILD/" "$PUBSPEC"

          # Commit to persist build_number in repo
          # Push to main branch (works even from detached HEAD / tag checkout)
          git config user.email "ci@github.com"
          git config user.name "GitHub CI"
          git add "$PUBSPEC"
          git commit -m "ci: auto bump build number to $NEW_BUILD"

          # Fetch latest main and rebase our bump commit on top of it.
          # This prevents non-fast-forward rejection when the version bump
          # commit from 'make release-patch' is already on remote main.
          git fetch origin main
          git rebase origin/main
          git push origin HEAD:refs/heads/main

          echo "version_name=$VERSION_NAME" >> $GITHUB_OUTPUT
          echo "version_code=$NEW_BUILD" >> $GITHUB_OUTPUT
          echo "version_tag=v$VERSION_NAME" >> $GITHUB_OUTPUT

      - name: Generate release notes
        id: notes
        run: |
          VERSION="${{ steps.version.outputs.version_name }}"
          CURRENT_TAG="v$VERSION"

          # Find the nearest previous tag by walking back from HEAD.
          # `git describe --tags --abbrev=0 HEAD^` returns the most recent
          # tag reachable from the parent of the current commit, which is
          # exactly "the tag right before this release".
          PREV_TAG=""
          if git rev-parse HEAD^ >/dev/null 2>&1; then
            PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || true)
          fi

          # Fallback: if describe failed (e.g. shallow clone), try sorted tag list
          if [ -z "$PREV_TAG" ]; then
            PREV_TAG=$(git tag --sort=-version:refname | grep -v "^${CURRENT_TAG}$" | head -n 1 || true)
          fi

          echo "Previous tag: ${PREV_TAG:-'(none)'}"
          echo "Current tag:  $CURRENT_TAG"

          echo "# 🎉 CB File Hub $VERSION" > release_notes.md
          echo "" >> release_notes.md
          echo "## 📝 What's Changed" >> release_notes.md
          echo "" >> release_notes.md

          if [ -z "$PREV_TAG" ]; then
            echo "Initial release" >> release_notes.md
          else
            # Collect ALL commits from the previous tag to the current HEAD
            # (which is the commit that the current tag points to).
            RANGE="$PREV_TAG..HEAD"

            # Patterns to exclude from release notes (ci, build, chore, bump, merge commits)
            EXCLUDE_PATTERN="^(ci:|build:|chore:|bump |Merge branch|Merge pull request|ci\(.*\):|build\(.*\):|chore\(.*\):)"

            # Helper: log commits matching a grep pattern, excluding noise commits
            log_section() {
              local grep_pattern="$1"
              git log --no-merges "$RANGE" --pretty=format:"- %s (%h)" --grep="$grep_pattern" \
                | grep -vE "$EXCLUDE_PATTERN" || true
            }

            # Helper: write a section, show "No ..." if empty
            write_section() {
              local header="$1"
              local empty_msg="$2"
              local content="$3"
              echo "$header" >> release_notes.md
              if [ -z "$content" ]; then
                echo "$empty_msg" >> release_notes.md
              else
                echo "$content" >> release_notes.md
              fi
              echo "" >> release_notes.md
              echo "" >> release_notes.md
            }

            # Features
            FEAT=$(log_section "^feat")
            write_section "### ✨ Features" "- No new features" "$FEAT"

            # Bug Fixes
            FIX=$(log_section "^fix")
            write_section "### 🐛 Bug Fixes" "- No bug fixes" "$FIX"

            # Documentation
            DOCS=$(log_section "^docs")
            write_section "### 📚 Documentation" "- No documentation changes" "$DOCS"

            # Refactoring / Performance
            REFACTOR=$(log_section "^refactor\|^perf")
            write_section "### ♻️ Refactoring & Performance" "- No refactoring changes" "$REFACTOR"

            # Other Changes — everything NOT feat/fix/docs/refactor/perf AND NOT excluded
            OTHER=$(git log --no-merges "$RANGE" --pretty=format:"- %s (%h)" \
              --invert-grep --grep="^feat" --grep="^fix" --grep="^docs" --grep="^refactor" --grep="^perf" \
              | grep -vE "$EXCLUDE_PATTERN" || true)
            write_section "### 🔧 Other Changes" "- No other changes" "$OTHER"
          fi

          echo "" >> release_notes.md
          echo "## 📦 Downloads" >> release_notes.md
          echo "" >> release_notes.md
          echo "Choose the appropriate package for your platform:" >> release_notes.md
          echo "" >> release_notes.md
          echo "### Windows" >> release_notes.md
          echo "- **Portable**: \`CBFileHub-$VERSION-windows-portable.zip\` - Extract and run, no installation needed" >> release_notes.md
          echo "- **MSI Installer**: \`CBFileHub-Setup-$VERSION.msi\` - Classic Windows installer" >> release_notes.md
          echo "- **MSIX Package**: \`CBFileHub-$VERSION.msix\` - Modern Windows package with clean install/uninstall" >> release_notes.md
          echo "" >> release_notes.md
          echo "### Android" >> release_notes.md
          echo "- **APK**: \`CBFileHub-$VERSION-arm64-v8a.apk\` (64-bit)" >> release_notes.md
          echo "- **APK**: \`CBFileHub-$VERSION-armeabi-v7a.apk\` (32-bit)" >> release_notes.md
          echo "- **AAB**: \`CBFileHub-$VERSION.aab\` (For Google Play)" >> release_notes.md
          echo "" >> release_notes.md
          echo "## 🚀 Installation" >> release_notes.md
          echo "" >> release_notes.md
          echo "### Windows" >> release_notes.md
          echo "**Portable (No Installation):**" >> release_notes.md
          echo "1. Download \`CBFileHub-$VERSION-windows-portable.zip\`" >> release_notes.md
          echo "2. Extract to any folder" >> release_notes.md
          echo "3. Run \`cb_file_manager.exe\`" >> release_notes.md
          echo "" >> release_notes.md
          echo "**MSI Installer:**" >> release_notes.md
          echo "1. Download \`CBFileHub-Setup-$VERSION.msi\`" >> release_notes.md
          echo "2. Run the installer" >> release_notes.md
          echo "3. Follow the setup wizard" >> release_notes.md
          echo "" >> release_notes.md
          echo "**MSIX Package:**" >> release_notes.md
          echo "1. Download \`CBFileHub-$VERSION.msix\`" >> release_notes.md
          echo "2. Open the package in Windows" >> release_notes.md
          echo "3. Approve the installation if Windows prompts for confirmation" >> release_notes.md
          echo "" >> release_notes.md
          echo "### Android" >> release_notes.md
          echo "- Download and install the \`.apk\` file" >> release_notes.md
          echo "- Enable \"Install from Unknown Sources\" if needed" >> release_notes.md

          # Save to output
          {
            echo 'notes<<EOF'
            cat release_notes.md
            echo EOF
          } >> $GITHUB_OUTPUT

      - name: Upload release notes
        uses: actions/upload-artifact@v4
        with:
          name: release-notes
          path: release_notes.md

  # Build Windows
  build-windows:
    runs-on: windows-latest
    needs: generate-release-notes
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: "stable"

      - name: Ensure build script is executable
        shell: bash
        run: chmod +x scripts/build.sh

      - name: Build Windows Portable
        shell: bash
        run: ./scripts/build.sh windows-portable

      - name: Rename Portable ZIP
        shell: bash
        run: |
          VERSION="${{ needs.generate-release-notes.outputs.version_name }}"
          OUTPUT_DIR="${{ env.PROJECT_DIR }}/build/windows/portable"
          TARGET_FILE="$OUTPUT_DIR/CBFileHub-$VERSION-windows-portable.zip"
          SOURCE_FILE=""
          for candidate in \
            "CBFileHub-Portable.zip" \
            "CoolBirdTagify-Portable.zip" \
            "CBFileHub-$VERSION-windows-portable.zip"; do
            if [ -f "$OUTPUT_DIR/$candidate" ]; then
              SOURCE_FILE="$OUTPUT_DIR/$candidate"
              break
            fi
          done
          if [ -z "$SOURCE_FILE" ]; then
            echo "::error::Portable ZIP not found in $OUTPUT_DIR"
            ls -la "$OUTPUT_DIR"
            exit 1
          fi
          if [ "$SOURCE_FILE" != "$TARGET_FILE" ]; then
            mv "$SOURCE_FILE" "$TARGET_FILE"
          fi

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: ${{ env.PROJECT_DIR }}/build/windows/portable/*.zip

  # Build Windows MSI
  build-windows-msi:
    runs-on: windows-latest
    needs: generate-release-notes
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: "stable"

      - name: Install WiX Toolset
        run: |
          dotnet tool install --global wix --version 4.0.5
          wix extension add -g WixToolset.UI.wixext/4.0.5
          echo "$env:USERPROFILE\.dotnet\tools" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Ensure build script is executable
        shell: bash
        run: chmod +x scripts/build.sh

      - name: Build MSI
        shell: bash
        run: ./scripts/build.sh windows-msi

      - name: Rename MSI
        shell: bash
        run: |
          VERSION="${{ needs.generate-release-notes.outputs.version_name }}"
          OUTPUT_DIR="${{ env.PROJECT_DIR }}/build/windows/installer"
          TARGET_FILE="$OUTPUT_DIR/CBFileHub-Setup-$VERSION.msi"
          SOURCE_FILE=""
          for candidate in \
            "CBFileHub-Setup.msi" \
            "CoolBirdTagify-Setup.msi" \
            "CBFileHub-Setup-$VERSION.msi"; do
            if [ -f "$OUTPUT_DIR/$candidate" ]; then
              SOURCE_FILE="$OUTPUT_DIR/$candidate"
              break
            fi
          done
          if [ -z "$SOURCE_FILE" ]; then
            echo "::error::MSI installer not found in $OUTPUT_DIR"
            ls -la "$OUTPUT_DIR"
            exit 1
          fi
          if [ "$SOURCE_FILE" != "$TARGET_FILE" ]; then
            mv "$SOURCE_FILE" "$TARGET_FILE"
          fi

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-msi
          path: ${{ env.PROJECT_DIR }}/build/windows/installer/*.msi

  # Build Windows MSIX
  build-windows-msix:
    runs-on: windows-latest
    needs: generate-release-notes
    environment: Production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: "stable"

      - name: Restore MSIX signing certificate
        shell: pwsh
        run: |
          if ([string]::IsNullOrWhiteSpace("${{ secrets.MSIX_CERT_BASE64 }}")) {
            throw "Missing required secret: MSIX_CERT_BASE64"
          }
          if ([string]::IsNullOrWhiteSpace("${{ secrets.MSIX_CERT_PASSWORD }}")) {
            throw "Missing required secret: MSIX_CERT_PASSWORD"
          }

          $certPath = Join-Path $env:RUNNER_TEMP "cb-file-hub-signing.pfx"
          $bytes = [Convert]::FromBase64String("${{ secrets.MSIX_CERT_BASE64 }}")
          [IO.File]::WriteAllBytes($certPath, $bytes)

          $certificate = New-Object System.Security.Cryptography.X509Certificates.X509Certificate2(
            $certPath,
            "${{ secrets.MSIX_CERT_PASSWORD }}"
          )
          $actualPublisher = $certificate.Subject

          $publisherLine = Select-String -Path "${{ env.PROJECT_DIR }}/pubspec.yaml" -Pattern "^\s*publisher:\s*(.+)$" | Select-Object -First 1
          if (-not $publisherLine) {
            throw "Could not find msix_config publisher in ${{ env.PROJECT_DIR }}/pubspec.yaml"
          }

          $expectedPublisher = $publisherLine.Matches[0].Groups[1].Value.Trim()
          if ($expectedPublisher -ne $actualPublisher) {
            throw "MSIX certificate subject does not match pubspec publisher. Expected '$expectedPublisher' but got '$actualPublisher'."
          }

          "MSIX_CERT_PATH=$certPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "MSIX_CERT_SUBJECT=$actualPublisher" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Ensure build script is executable
        shell: bash
        run: chmod +x scripts/build.sh

      - name: Build MSIX
        shell: bash
        env:
          MSIX_CERT_PATH: ${{ env.MSIX_CERT_PATH }}
          MSIX_CERT_PASSWORD: ${{ secrets.MSIX_CERT_PASSWORD }}
          MSIX_PUBLISHER: ${{ env.MSIX_CERT_SUBJECT }}
          MSIX_REQUIRE_SIGNING: "true"
        run: ./scripts/build.sh windows-msix

      - name: Upload MSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-msix
          path: ${{ env.PROJECT_DIR }}/build/windows/msix/*.msix

  # Build Android APK
  build-android-apk:
    runs-on: ubuntu-latest
    needs: generate-release-notes
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: "stable"

      - name: Install dependencies
        run: |
          cd ${{ env.PROJECT_DIR }}
          flutter pub get

      - name: Build APK
        run: |
          cd ${{ env.PROJECT_DIR }}
          flutter build apk --release --split-per-abi --build-name ${{ needs.generate-release-notes.outputs.version_name }} --build-number ${{ needs.generate-release-notes.outputs.version_code }}

      - name: Rename APK files
        run: |
          VERSION="${{ needs.generate-release-notes.outputs.version_name }}"
          cd ${{ env.PROJECT_DIR }}/build/app/outputs/flutter-apk

          for file in *.apk; do
            if [[ $file == *"arm64-v8a"* ]]; then
              mv "$file" "CBFileHub-$VERSION-arm64-v8a.apk"
            elif [[ $file == *"armeabi-v7a"* ]]; then
              mv "$file" "CBFileHub-$VERSION-armeabi-v7a.apk"
            elif [[ $file == *"x86_64"* ]]; then
              mv "$file" "CBFileHub-$VERSION-x86_64.apk"
            fi
          done

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: ${{ env.PROJECT_DIR }}/build/app/outputs/flutter-apk/*.apk

  # Build Android AAB
  build-android-aab:
    runs-on: ubuntu-latest
    needs: generate-release-notes
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: "stable"

      - name: Install dependencies
        run: |
          cd ${{ env.PROJECT_DIR }}
          flutter pub get

      - name: Build AAB
        run: |
          cd ${{ env.PROJECT_DIR }}
          flutter build appbundle --release --build-name ${{ needs.generate-release-notes.outputs.version_name }} --build-number ${{ needs.generate-release-notes.outputs.version_code }}

      - name: Rename AAB file
        run: |
          VERSION="${{ needs.generate-release-notes.outputs.version_name }}"
          cd ${{ env.PROJECT_DIR }}/build/app/outputs/bundle/release
          mv app-release.aab "CBFileHub-$VERSION.aab"

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-aab
          path: ${{ env.PROJECT_DIR }}/build/app/outputs/bundle/release/*.aab

  # Create GitHub Release
  create-release:
    runs-on: ubuntu-latest
    needs:
      - generate-release-notes
      - build-windows
      - build-windows-msi
      - build-windows-msix
      - build-android-apk
      - build-android-aab
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display structure of downloaded files
        run: ls -R artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ needs.generate-release-notes.outputs.version_tag }}
          name: CB File Hub ${{ needs.generate-release-notes.outputs.version_tag }}
          body: ${{ needs.generate-release-notes.outputs.release_notes }}
          draft: false
          prerelease: false
          files: |
            artifacts/windows-build/*.zip
            artifacts/windows-msi/*.msi
            artifacts/windows-msix/*.msix
            artifacts/android-apk/*.apk
            artifacts/android-aab/*.aab
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
