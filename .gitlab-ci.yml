stages:
  - prepare
  - build
  - release

workflow:
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/'
    - when: never

variables:
  GIT_DEPTH: "0"
  GIT_STRATEGY: clone
  FLUTTER_VERSION: "3.41.5"
  GITHUB_REPO: "coolbirdzik/cb-file-hub"
  RELEASE_OUTPUT_DIR: "ci/release"

prepare_release:
  stage: prepare
  image: ubuntu:24.04
  before_script:
    - apt-get update
    - apt-get install -y bash git
  script:
    - bash scripts/ci/generate_release_metadata.sh "$RELEASE_OUTPUT_DIR"
  artifacts:
    paths:
      - $RELEASE_OUTPUT_DIR/
    reports:
      dotenv: $RELEASE_OUTPUT_DIR/release.env

build_android_release:
  stage: build
  image: ghcr.io/cirruslabs/flutter:${FLUTTER_VERSION}
  needs:
    - job: prepare_release
      artifacts: true
  before_script:
    - apt-get update
    - apt-get install -y bash make zip
  script:
    - make android
    - make android-aab
    - mkdir -p "$RELEASE_OUTPUT_DIR/android"
    - |
      for file in cb_file_manager/build/app/outputs/flutter-apk/*.apk; do
        [ -f "$file" ] || continue
        case "$file" in
          *arm64-v8a*)
            cp "$file" "$RELEASE_OUTPUT_DIR/android/CBFileHub-${RELEASE_VERSION}-arm64-v8a.apk"
            ;;
          *armeabi-v7a*)
            cp "$file" "$RELEASE_OUTPUT_DIR/android/CBFileHub-${RELEASE_VERSION}-armeabi-v7a.apk"
            ;;
          *x86_64*)
            cp "$file" "$RELEASE_OUTPUT_DIR/android/CBFileHub-${RELEASE_VERSION}-x86_64.apk"
            ;;
        esac
      done
    - cp "cb_file_manager/build/app/outputs/bundle/release/app-release.aab" "$RELEASE_OUTPUT_DIR/android/CBFileHub-${RELEASE_VERSION}.aab"
  artifacts:
    paths:
      - $RELEASE_OUTPUT_DIR/android/

build_windows_release:
  stage: build
  needs:
    - job: prepare_release
      artifacts: true
  script:
    - '$ErrorActionPreference = "Stop"'
    - '$gitBashCandidates = @("$env:ProgramFiles\\Git\\bin\\bash.exe", "${env:ProgramFiles(x86)}\\Git\\bin\\bash.exe")'
    - '$gitBash = $gitBashCandidates | Where-Object { $_ -and (Test-Path $_) } | Select-Object -First 1'
    - 'if (-not $gitBash) { throw "Git Bash is required on the Windows runner." }'
    - '$env:Path += ";C:\\ProgramData\\chocolatey\\bin"'
    - 'if (-not (Get-Command make.exe -ErrorAction SilentlyContinue)) { choco install make -y }'
    - 'if (-not (Get-Command iscc.exe -ErrorAction SilentlyContinue)) { choco install innosetup -y }'
    - '& $gitBash -lc "export PATH=\"/c/ProgramData/chocolatey/bin:$PATH\"; make windows-exe"'
    - 'New-Item -ItemType Directory -Force -Path "$env:RELEASE_OUTPUT_DIR\\windows" | Out-Null'
    - 'Copy-Item "cb_file_manager\\build\\windows\\portable\\CBFileHub-Portable.zip" "$env:RELEASE_OUTPUT_DIR\\windows\\CBFileHub-$env:RELEASE_VERSION-windows-portable.zip" -Force'
    - 'Copy-Item "cb_file_manager\\build\\windows\\installer\\CBFileHub-Setup.exe" "$env:RELEASE_OUTPUT_DIR\\windows\\CBFileHub-Setup-$env:RELEASE_VERSION.exe" -Force'
  artifacts:
    paths:
      - $RELEASE_OUTPUT_DIR/windows/

publish_github_release:
  stage: release
  image: ubuntu:24.04
  needs:
    - job: prepare_release
      artifacts: true
    - job: build_android_release
      artifacts: true
    - job: build_windows_release
      artifacts: true
  before_script:
    - apt-get update
    - apt-get install -y bash curl jq
  script:
    - test -n "$GITHUB_TOKEN" || (echo "GITHUB_TOKEN is required" && exit 1)
    - bash scripts/ci/publish_github_release.sh "$RELEASE_OUTPUT_DIR/release_notes.md" "$RELEASE_OUTPUT_DIR/android"/* "$RELEASE_OUTPUT_DIR/windows"/*
